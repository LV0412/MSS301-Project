server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Origin
              - X-Requested-With
            exposedHeaders:
              - Authorization
            allowCredentials: false
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/v1/users/**,/api/internal/users/**,/api/internal/health-profiles/**,/api/internal/nutrition-goals/**,/api/internal/diet-preferences/**,/api/internal/user-allergies/**,/api/internal/food-logs/**,/api/internal/ai-profile/**
        - id: recipe-service
          uri: ${RECIPE_SERVICE_URL:http://localhost:8002}
          predicates:
            - Path=/api/recipes/**,/api/v1/recipes/**,/api/ingredients/**,/api/v1/ingredients/**,/api/categories/**,/api/v1/categories/**,/api/allergens/**,/api/v1/allergens/**,/api/internal/recipes/**
        - id: ai-recommendation-service
          uri: ${AI_RECOMMENDATION_SERVICE_URL:http://localhost:8003}
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
