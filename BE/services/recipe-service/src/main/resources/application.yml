server:
  port: ${APP_PORT:8002}

spring:
  application:
    name: recipe-service
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/recipe_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  seed-data:
    enabled: ${APP_SEED_DATA_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
