server:
  port: ${APP_PORT:8001}

spring:
  application:
    name: user-service
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/user_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 1
    validate-on-migrate: true

app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  recipe-service:
    base-url: ${RECIPE_SERVICE_URL:http://localhost:8002}
    recipe-cache-ttl: ${RECIPE_CACHE_TTL:10m}
    allergen-cache-ttl: ${ALLERGEN_CACHE_TTL:12h}
