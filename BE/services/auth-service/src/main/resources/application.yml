server:
  port: ${APP_PORT:8000}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/auth_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:false}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

auth:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-with-at-least-32-characters}
    issuer: ${JWT_ISSUER:mss301-auth-service}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:20}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:no-reply@nutrichef.local}
  security:
    max-failed-login-attempts: 5
    lock-minutes: 15
    otp-expiry-minutes: 5
    reset-token-expiry-minutes: 15
    resend-otp-cooldown-seconds: 60
