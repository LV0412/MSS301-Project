name: mss301

services:
  auth-mysql:
    image: mysql:8.4
    container_name: mss301-auth-mysql
    environment:
      MYSQL_DATABASE: auth_service
      MYSQL_ROOT_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "127.0.0.1:${AUTH_MYSQL_PORT:-3307}:3306"
    volumes:
      - auth_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${AUTH_MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./BE/services/auth-service
    container_name: mss301-auth-service
    depends_on:
      auth-mysql:
        condition: service_healthy
      user-service:
        condition: service_started
    env_file:
      - path: ./BE/services/auth-service/.env
        required: false
    environment:
      AUTH_APP_PORT: 8000
      AUTH_DATABASE_URL: jdbc:mysql://auth-mysql:3306/auth_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      AUTH_DATABASE_USERNAME: root
      AUTH_DATABASE_PASSWORD: ${AUTH_MYSQL_ROOT_PASSWORD:-root}
      USER_SERVICE_URL: http://user-service:8001
    expose:
      - "8000"

  user-mysql:
    image: mysql:8.4
    container_name: mss301-user-mysql
    environment:
      MYSQL_DATABASE: ${USER_MYSQL_DATABASE:-user_service}
      MYSQL_ROOT_PASSWORD: ${USER_MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "127.0.0.1:${USER_MYSQL_PORT:-3308}:3306"
    volumes:
      - user_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${USER_MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./BE/services/user-service
    container_name: mss301-user-service
    depends_on:
      user-mysql:
        condition: service_healthy
    env_file:
      - path: ./BE/services/user-service/.env
        required: false
    environment:
      APP_PORT: 8001
      DATABASE_URL: jdbc:mysql://user-mysql:3306/${USER_MYSQL_DATABASE:-user_service}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${USER_MYSQL_ROOT_PASSWORD:-root}
      JPA_DDL_AUTO: ${USER_JPA_DDL_AUTO:-validate}
      JPA_SHOW_SQL: ${USER_JPA_SHOW_SQL:-false}
      APP_SEED_ENABLED: true
      RECIPE_SERVICE_URL: http://recipe-service:8002
    expose:
      - "8001"

  recipe-mysql:
    image: mysql:8.4
    container_name: mss301-recipe-mysql
    environment:
      MYSQL_DATABASE: ${RECIPE_MYSQL_DATABASE:-recipe_service}
      MYSQL_ROOT_PASSWORD: ${RECIPE_MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "127.0.0.1:${RECIPE_MYSQL_PORT:-3309}:3306"
    volumes:
      - recipe_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${RECIPE_MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  recipe-service:
    build:
      context: ./BE/services/recipe-service
    container_name: mss301-recipe-service
    depends_on:
      recipe-mysql:
        condition: service_healthy
    env_file:
      - path: ./BE/services/recipe-service/.env
        required: false
    environment:
      APP_PORT: 8002
      DATABASE_URL: jdbc:mysql://recipe-mysql:3306/${RECIPE_MYSQL_DATABASE:-recipe_service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${RECIPE_MYSQL_ROOT_PASSWORD:-root}
      JPA_SHOW_SQL: ${RECIPE_JPA_SHOW_SQL:-false}
    expose:
      - "8002"

  ai-postgres:
    image: postgres:16-alpine
    container_name: mss301-ai-postgres
    environment:
      POSTGRES_DB: ai_recommendation
      POSTGRES_USER: ${AI_DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AI_DATABASE_PASSWORD:-postgres}
    ports:
      - "${AI_POSTGRES_PORT:-5434}:5432"
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DATABASE_USERNAME:-postgres} -d ai_recommendation"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-recommendation-service:
    build:
      context: ./BE/services/ai-recommendation-service
    container_name: mss301-ai-recommendation-service
    depends_on:
      ai-postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      recipe-service:
        condition: service_started
    environment:
      AI_SERVICE_PORT: 8004
      AI_TOP_K: ${AI_TOP_K:-5}
      AI_LLM_PROVIDER: ${AI_LLM_PROVIDER:-local}
      AI_LLM_STRICT: ${AI_LLM_STRICT:-false}
      AI_PERSIST_RECOMMENDATIONS: ${AI_PERSIST_RECOMMENDATIONS:-true}
      USER_SERVICE_URL: http://user-service:8001
      RECIPE_SERVICE_URL: http://recipe-service:8002
      DATABASE_URL: postgresql+psycopg://${AI_DATABASE_USERNAME:-postgres}:${AI_DATABASE_PASSWORD:-postgres}@ai-postgres:5432/ai_recommendation
      FOODY_BASE_MODEL: ${FOODY_BASE_MODEL:-meta-llama/Meta-Llama-3-8B-Instruct}
      FOODY_ADAPTER: ${FOODY_ADAPTER:-Matej/FoodyLLM}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      LLM_MAX_NEW_TOKENS: ${LLM_MAX_NEW_TOKENS:-512}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_LOAD_IN_4BIT: ${LLM_LOAD_IN_4BIT:-true}
      CHROMA_PATH: /data/chroma
    ports:
      - "${AI_SERVICE_PORT:-8004}:8004"
    volumes:
      - ai_chroma_data:/data/chroma

  api-gateway-service:
    build:
      context: ./BE/services/api-gateway-service
    container_name: mss301-api-gateway-service
    depends_on:
      - auth-service
      - user-service
      - recipe-service
      - ai-recommendation-service
    environment:
      APP_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8001
      RECIPE_SERVICE_URL: http://recipe-service:8002
      AI_RECOMMENDATION_SERVICE_URL: http://ai-recommendation-service:8004
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-at-least-32-bytes-long}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  eureka-server:
    profiles: ["future"]
    image: eclipse-temurin:21-jre
    command: ["java", "-version"]

  config-server:
    profiles: ["future"]
    image: eclipse-temurin:21-jre
    command: ["java", "-version"]

volumes:
  auth_mysql_data:
  user_mysql_data:
  recipe_mysql_data:
  ai_postgres_data:
  ai_chroma_data:
