services:
  ai-recommendation-service:
    build:
      context: ./BE/services/ai-recommendation-service
      dockerfile: Dockerfile.gpu
    gpus: all
    shm_size: "2gb"
    environment:
      AI_LLM_PROVIDER: foodyllm
      AI_LLM_STRICT: "true"
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
    volumes:
      - hf_model_cache:/models/huggingface

volumes:
  hf_model_cache:
